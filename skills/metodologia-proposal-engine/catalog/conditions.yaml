  subsequent_rescheduling_cop: 200000

b2b2b_requirements:
  cobrand:
    lead_time_days: 35
    prerequisites:
      - signed_master_contract
      - signed_brand_use_agreement
      - partner_brand_kit    # logos (vector), colors, typography, tone
    approval_time_materials_days: 3   # partner reviews co-branded materials
    minimum_executions_6mo: 2
    revenue_models: [fixed_per_execution, revenue_share, prepaid_volume]
    revenue_share_metodologia_pct: "60-70"
    revenue_share_partner_pct: "30-40"
  whitelabel:
    lead_time_option_a_days: 35     # MetodologIA facilitates, invisible
    lead_time_option_b_days: "60-75"   # partner facilitates (requires training)
    setup_fee_cop_range: [4000000, 7000000]   # one-time
    facilitator_training_hours: 26
    facilitator_training_fee_cop_range: [8000000, 12000000]   # per facilitator
    license_models:
      - per_execution:
          option_a_range_cop: [5000000, 8000000]
          option_b_range_cop: [3000000, 5000000]
      - annual:
          range_cop: [30000000, 45000000]
          includes_executions: "6-8"
      - volume_tiered:
          bands: ["1-3: base", "4-6: -10%", "7-10: -20%", "11+: -25%"]
    quality_thresholds:
      nps_min: 7.5
      completion_rate_min_pct: 65
    content_update_adoption_days: 45   # max time to adopt new canonical version
    sublicensing: not_permitted_without_explicit_authorization

